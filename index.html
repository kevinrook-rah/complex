<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Right at Home Referral Engagement Tool</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f8f7f4;
  color:#1a1a18;
  margin:0;
  padding:0;
}

.shell{
  max-width:1000px;
  margin:auto;
  padding:30px 20px 80px;
}

.logo{
  display:inline-block;
  background:#1D9E75;
  color:#fff;
  padding:5px 12px;
  border-radius:6px;
  font-size:12px;
  font-weight:600;
}

h1{
  font-size:24px;
  margin:16px 0 6px;
}

.sub{
  color:#666;
  margin-bottom:24px;
}

.card{
  background:#fff;
  border:1px solid #ddd;
  border-radius:12px;
  padding:18px;
  margin-bottom:16px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  margin-top:6px;
  margin-bottom:16px;
  box-sizing:border-box;
}

button{
  background:#1D9E75;
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  background:#15785a;
}

.loading{
  background:#fff;
  border-radius:10px;
  padding:18px;
  margin-top:16px;
  border:1px solid #ddd;
}

.result{
  background:#fff;
  border-radius:10px;
  padding:16px;
  margin-top:12px;
  border:1px solid #ddd;
}

.result h3{
  margin-top:0;
}

.badge{
  display:inline-block;
  background:#E1F5EE;
  color:#085041;
  padding:4px 8px;
  border-radius:20px;
  font-size:11px;
  margin-bottom:8px;
}

.contact{
  padding:10px;
  background:#f8f7f4;
  border-radius:8px;
  margin-top:10px;
}

.small{
  font-size:13px;
  color:#666;
}

.error{
  background:#FCEBEB;
  border:1px solid #F09595;
  color:#501313;
  padding:12px;
  border-radius:8px;
  margin-top:16px;
}
</style>
</head>

<body>

<div class="shell">

<span class="logo">Right at Home</span>

<h1>NHS & Private Referral Engagement Tool</h1>

<div class="sub">
Search local referral opportunities safely without hitting Anthropic rate limits.
</div>

<div class="card">

<label>Your Anthropic API Key</label>
<input id="apiKey" type="password" placeholder="sk-ant-api03-...">

<label>Your Territory</label>
<select id="location">
<option value="Stockport">Stockport</option>
<option value="Sefton">Sefton</option>
<option value="Bromley">Bromley</option>
<option value="Oxford">Oxford</option>
<option value="Central London">Central London</option>
<option value="Reading & Wokingham">Reading & Wokingham</option>
<option value="Solihull">Solihull</option>
<option value="Portsmouth">Portsmouth</option>
</select>

<button onclick="runSearch()">
<i class="ti ti-search"></i>
Build Engagement Map
</button>

</div>

<div id="status"></div>

<div id="results"></div>

</div>

<script>

const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';

let lastApiCall = 0;

const categories = [
{
  key:'nhs',
  label:'NHS Organisations',
  prompt:(loc)=>`
Find real NHS discharge teams, hospitals, community trusts and ICB organisations in ${loc}, UK relevant to home care referrals.

Return JSON array only:

[
{
"name":"",
"type":"",
"why_priority":"",
"contacts":[
{
"name":"",
"role":"",
"email":""
}
]
}
]
`
},

{
  key:'gp',
  label:'GP Practices & PCNs',
  prompt:(loc)=>`
Find real GP practices and PCNs in ${loc}, UK relevant to home care referrals.

Return JSON array only.

[
{
"name":"",
"pcn":"",
"why_priority":"",
"contacts":[
{
"name":"",
"role":"",
"email":""
}
]
}
]
`
},

{
  key:'solicitors',
  label:'Solicitors',
  prompt:(loc)=>`
Find elderly care, probate or Court of Protection solicitors in ${loc}, UK.

Return JSON array only.

[
{
"name":"",
"specialism":"",
"why_priority":"",
"contacts":[
{
"name":"",
"role":"",
"email":""
}
]
}
]
`
},

{
  key:'dementia',
  label:'Dementia & Carer Groups',
  prompt:(loc)=>`
Find dementia cafes, Age UK branches and carers groups in ${loc}, UK.

Return JSON array only.

[
{
"name":"",
"type":"",
"why_priority":"",
"contacts":[
{
"name":"",
"role":"",
"email":""
}
]
}
]
`
}
];

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function callClaude(prompt, apiKey, attempt=1){

  const now = Date.now();
  const diff = now - lastApiCall;

  if(diff < 7000){
    await sleep(7000 - diff);
  }

  lastApiCall = Date.now();

  const body = {
    model: MODEL,
    max_tokens: 1200,
    messages:[
      {
        role:'user',
        content:prompt
      }
    ]
  };

  try{

    const response = await fetch(API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify(body)
    });

    if(response.status === 429){

      if(attempt > 5){
        throw new Error('Rate limit exceeded too many times');
      }

      const waitTimes = [15000,30000,60000,90000,120000];
      const wait = waitTimes[attempt-1];

      document.getElementById('status').innerHTML =
      `
      <div class="loading">
      Rate limited by Anthropic.<br><br>
      Waiting ${wait/1000} seconds before retry...
      </div>
      `;

      await sleep(wait);

      return callClaude(prompt, apiKey, attempt+1);
    }

    if(!response.ok){

      const text = await response.text();

      throw new Error(text);
    }

    const data = await response.json();

    return data.content
      .filter(x=>x.type==='text')
      .map(x=>x.text)
      .join('');

  }catch(err){

    console.error(err);

    throw err;
  }
}

function safeJSON(text){

  try{

    text = text.trim();

    const start = text.indexOf('[');

    const end = text.lastIndexOf(']');

    text = text.slice(start,end+1);

    return JSON.parse(text);

  }catch(e){

    console.error(e);

    return [];
  }
}

function renderCategory(title, items){

  let html = `
  <div class="card">
  <h2>${title}</h2>
  `;

  if(!items.length){

    html += `
    <div class="small">
    No results found.
    </div>
    </div>
    `;

    return html;
  }

  items.forEach(item=>{

    html += `
    <div class="result">

      <div class="badge">
      ${item.type || item.specialism || 'Referral Opportunity'}
      </div>

      <h3>${item.name}</h3>

      <div class="small">
      ${item.why_priority || ''}
      </div>
    `;

    if(item.contacts && item.contacts.length){

      item.contacts.forEach(c=>{

        html += `
        <div class="contact">

          <strong>${c.name || 'Contact'}</strong><br>

          <span class="small">
          ${c.role || ''}
          </span><br>

          <span style="color:#1D9E75">
          ${c.email || ''}
          </span>

        </div>
        `;
      });
    }

    html += `</div>`;
  });

  html += `</div>`;

  return html;
}

async function runSearch(){

  const apiKey = document.getElementById('apiKey').value.trim();
  const location = document.getElementById('location').value;

  if(!apiKey){

    alert('Please enter your Anthropic API key');

    return;
  }

  document.getElementById('results').innerHTML = '';

  document.getElementById('status').innerHTML =
  `
  <div class="loading">
  Starting local intelligence search for ${location}...
  </div>
  `;

  for(const category of categories){

    try{

      document.getElementById('status').innerHTML =
      `
      <div class="loading">
      Searching ${category.label} in ${location}...
      </div>
      `;

      const raw = await callClaude(
        category.prompt(location),
        apiKey
      );

      const parsed = safeJSON(raw);

      document.getElementById('results').innerHTML +=
      renderCategory(category.label, parsed);

      localStorage.setItem(
        'rah-cache-' + category.key + '-' + location,
        JSON.stringify(parsed)
      );

      await sleep(8000);

    }catch(err){

      document.getElementById('results').innerHTML +=
      `
      <div class="error">
      Failed loading ${category.label}<br><br>
      ${err.message}
      </div>
      `;

      await sleep(15000);
    }
  }

  document.getElementById('status').innerHTML =
  `
  <div class="loading">
  ✅ Search complete for ${location}
  </div>
  `;
}

</script>

</body>
</html>
