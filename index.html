<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complex Care Growth System — Right at Home</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">

<style>
body { font-family: -apple-system, Segoe UI; background:#f8f7f4; margin:0; }
.shell { max-width:900px; margin:auto; padding:20px; }

.nav-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.nav-tab { padding:8px 14px; border-radius:8px; background:#eeece5; border:1px solid #ddd; cursor:pointer; }
.nav-tab.active { background:#fff; border-color:#888; }

.view { display:none; }
.view.active { display:block; }

.section-title { font-size:20px; margin-bottom:10px; }
.section-sub { color:#666; margin-bottom:15px; }

.gov-card { background:#fff; border:1px solid #ddd; border-radius:10px; margin-bottom:10px; }
.gov-header { padding:12px; font-weight:500; }
.gov-body { padding:12px; }

.btn { padding:6px 10px; border-radius:6px; border:1px solid #ccc; cursor:pointer; }
.btn.primary { background:#1D9E75; color:#fff; }

.action-row { padding:10px; border-bottom:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; }
</style>
</head>

<body>
<div class="shell">

<div class="nav-row">
  <button class="nav-tab active" onclick="switchView('readiness')" id="nav-readiness">Readiness</button>
  <button class="nav-tab" onclick="switchView('plan')" id="nav-plan">Plan</button>
  <button class="nav-tab" onclick="switchView('tracker')" id="nav-tracker">Execute</button>
  <button class="nav-tab" onclick="switchView('nhs')" id="nav-nhs">NHS</button>
  <button class="nav-tab" onclick="switchView('cost')" id="nav-cost">Cost</button>
</div>

<!-- READINESS -->
<div class="view active" id="view-readiness">
  <div class="section-title">Complex Care Readiness</div>
  <div id="readiness-form"></div>

  <div style="margin-top:10px;">
    <b>Score:</b> <span id="score">0</span> |
    <b>Level:</b> <span id="level"></span>
  </div>

  <div id="output" style="margin-top:10px;"></div>

  <button class="btn primary" onclick="goToPlan()">View Growth Plan</button>
</div>

<!-- PLAN -->
<div class="view" id="view-plan">
  <div class="section-title">Your Growth Plan</div>
  <div id="plan-content"></div>
</div>

<!-- TRACKER -->
<div class="view" id="view-tracker">
  <div class="section-title">Execution Tracker</div>
  <div class="section-sub">Complete actions from your plan</div>

  <div id="tracker"></div>
</div>

<!-- NHS -->
<div class="view" id="view-nhs">
  <div class="section-title">NHS Relationships</div>
  <div class="section-sub">Track key contacts</div>
</div>

<!-- COST -->
<div class="view" id="view-cost">
  <div class="section-title">Cost Model</div>
</div>

</div>

<script>

const readiness = {};
const weights = {strategy:1,delivery:2,workforce:2,governance:3,commercial:1.5,market:1};

function q(id,text,section){
  return `
    <div>
      <div>${text}</div>
      <select onchange="save('${id}','${section}',this.value)">
        <option></option>
        <option value="0">No</option>
        <option value="1">Partial</option>
        <option value="2">Yes</option>
      </select>
    </div>`;
}

function renderReadiness(){
  document.getElementById("readiness-form").innerHTML=`

    ${q("plan","Complex care in your strategy?","strategy")}
    ${q("tasks","Deliver delegated tasks?","delivery")}
    ${q("rn","Have a Registered Nurse?","workforce")}
    ${q("framework","Delegation framework exists?","governance")}
    ${q("cost","Know cost-to-deliver?","commercial")}
    ${q("relationships","Have NHS relationships?","market")}

  `;
}

function save(id,section,val){
  readiness[id]={section,val:parseInt(val)};
  calculate();
}

function calculate(){
  let totals={strategy:0,delivery:0,workforce:0,governance:0,commercial:0,market:0};

  Object.values(readiness).forEach(r=>{
    totals[r.section]+=r.val;
  });

  let score=0;
  Object.keys(totals).forEach(s=>{
    score += totals[s]*weights[s];
  });

  let level="";
  if(score<30) level="Foundation";
  else if(score<60) level="Emerging";
  else if(score<80) level="Growth Ready";
  else level="Advanced";

  // pathway
  let pathway="A";
  if(score<30) pathway="A";
  else if(score<70) pathway="B";
  else if(score>=70 && readiness.rn?.val>0) pathway="C";
  else pathway="D";

  localStorage.setItem("pathway",pathway);

  document.getElementById("score").textContent=Math.round(score);
  document.getElementById("level").textContent=level;

  document.getElementById("output").innerHTML=`
    <div><b>Pathway:</b> ${pathway}</div>
  `;
}

function goToPlan(){
  switchView('plan');
  buildPlan(localStorage.getItem("pathway"));
}

function buildPlan(p){

  const plans={
    A:["Build governance","Train staff","Start small"],
    B:["Formalise delegation","Add 2 clients","Meet CHC"],
    C:["Assess TDDI","Hire RN","Prepare CQC"],
    D:["Prepare tenders","Build ICB links","Refine pricing"]
  };

  document.getElementById("plan-content").innerHTML=
    plans[p].map(a=>`
      <div class="action-row" onclick="switchView('tracker')">
        ${a}
      </div>
    `).join("");
}

function switchView(v){
  ['readiness','plan','tracker','nhs','cost'].forEach(n=>{
    document.getElementById('view-'+n).classList.toggle('active',n===v);
    document.getElementById('nav-'+n).classList.toggle('active',n===v);
  });
}

// INIT
renderReadiness();

</script>
</body>
</html>
