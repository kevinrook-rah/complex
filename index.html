<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Right at Home — NHS & Private Referral Engagement Tool</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">

<style>

*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#f8f7f4;
color:#1a1a18;
min-height:100vh;
}

.shell{
max-width:1100px;
margin:auto;
padding:28px 20px 80px;
}

.logo-badge{
background:#1D9E75;
color:#fff;
font-size:11px;
font-weight:600;
padding:4px 10px;
border-radius:6px;
}

.top-title{
font-size:18px;
font-weight:500;
}

.top-bar{
display:flex;
align-items:center;
gap:10px;
margin-bottom:24px;
}

.setup-card,
.org-card,
.loading-card,
.event-card,
.stat-card{
background:#fff;
border:.5px solid #d4d2ca;
border-radius:12px;
}

.setup-card{
padding:28px;
max-width:620px;
margin:auto;
}

.setup-field{
margin-bottom:16px;
}

.setup-field label{
display:block;
font-size:12px;
font-weight:600;
margin-bottom:6px;
color:#888780;
text-transform:uppercase;
}

.setup-field input,
.setup-field select{
width:100%;
padding:10px 12px;
border-radius:8px;
border:.5px solid #d4d2ca;
background:#f8f7f4;
font-family:inherit;
}

.loc-add-row{
display:flex;
gap:8px;
}

.loc-chips{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

.loc-chip{
background:#E1F5EE;
color:#085041;
padding:4px 10px;
border-radius:20px;
font-size:12px;
display:flex;
align-items:center;
gap:5px;
}

.loc-chip button{
border:none;
background:none;
cursor:pointer;
color:#085041;
}

.btn{
font-family:inherit;
font-size:13px;
padding:9px 14px;
border-radius:8px;
border:.5px solid #d4d2ca;
cursor:pointer;
background:#fff;
display:inline-flex;
align-items:center;
gap:6px;
}

.btn.primary{
background:#1D9E75;
border-color:#1D9E75;
color:#fff;
}

.user-bar{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
background:#fff;
border:.5px solid #d4d2ca;
padding:12px 16px;
border-radius:12px;
}

.loc-tabs{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.loc-tab{
padding:5px 12px;
border-radius:20px;
border:.5px solid #d4d2ca;
background:#f8f7f4;
cursor:pointer;
font-size:12px;
}

.loc-tab.active{
background:#1D9E75;
color:#fff;
border-color:#1D9E75;
}

.nav-row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:20px;
}

.nav-tab{
padding:8px 14px;
border-radius:8px;
border:.5px solid #d4d2ca;
background:#eeecea;
cursor:pointer;
}

.nav-tab.active{
background:#fff;
}

.view{
display:none;
}

.view.active{
display:block;
}

.section-title{
font-size:22px;
margin-bottom:6px;
}

.section-sub{
font-size:13px;
color:#666;
margin-bottom:20px;
line-height:1.6;
}

.loading-card{
padding:24px;
}

.org-card{
padding:16px;
margin-bottom:10px;
}

.badge{
display:inline-block;
font-size:11px;
font-weight:600;
padding:3px 8px;
border-radius:20px;
background:#E1F5EE;
color:#085041;
margin-bottom:8px;
}

.org-name{
font-size:15px;
font-weight:600;
margin-bottom:4px;
}

.org-meta{
font-size:12px;
color:#888780;
margin-bottom:10px;
}

.approach-box{
background:#f8f7f4;
padding:12px;
border-radius:8px;
font-size:13px;
line-height:1.6;
margin-bottom:10px;
}

.action-bar{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:20px;
}

.event-card{
padding:16px;
margin-bottom:10px;
}

.pulse{
display:inline-block;
width:8px;
height:8px;
border-radius:50%;
background:#1D9E75;
margin-right:8px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:.3}
}

</style>
</head>

<body>

<div class="shell">

<div class="top-bar">
<span class="logo-badge">Right at Home</span>
<span class="top-title">
NHS & Private Referral Engagement Tool
</span>
</div>

<!-- SETUP -->

<div id="setup-screen">

<div class="setup-card">

<div class="setup-field">
<label>Email address</label>
<input id="setup-email" placeholder="you@rightathome.co.uk">
</div>

<div class="setup-field">

<label>Franchise locations</label>

<div class="loc-chips" id="loc-chips"></div>

<div class="loc-add-row">

<select id="loc-select">
<option value="">Select location</option>
</select>

<button class="btn" onclick="addLocation()">
Add
</button>

</div>

</div>

<button class="btn primary"
onclick="initTool()"
style="width:100%;justify-content:center">

Build my engagement map

</button>

</div>

</div>

<!-- MAIN -->

<div id="main-tool" style="display:none">

<div class="user-bar">

<div id="user-email-display"
style="font-size:13px;color:#666"></div>

<div class="loc-tabs" id="loc-tabs"></div>

</div>

<div class="nav-row">

<button class="nav-tab active"
id="nav-intel"
onclick="switchView('intel')">
Local intelligence
</button>

<button class="nav-tab"
id="nav-events"
onclick="switchView('events')">
Local events
</button>

</div>

<!-- INTEL -->

<div class="view active" id="view-intel">

<div class="section-title" id="intel-title">
Your referral landscape
</div>

<div class="section-sub">
Structured local referral opportunities for your territory.
</div>

<div id="intel-content"></div>

</div>

<!-- EVENTS -->

<div class="view" id="view-events">

<div class="section-title">
Local events & forums
</div>

<div class="section-sub">
Networking and NHS engagement opportunities.
</div>

<div id="events-content"></div>

</div>

</div>

</div>

<script>

const RAH_LOCATIONS = [
"Ards & North Down",
"Ashby, Burton & Uttoxeter",
"Aylesbury Vale and Chiltern",
"Basingstoke",
"Bromley",
"Central London",
"Guildford & Farnham",
"Oxford",
"Portsmouth",
"Reading & Wokingham",
"Sefton",
"Solihull",
"Southampton",
"Stockport",
"Wimbledon, Putney and Kingston"
].sort();

let state = {
email:'',
locations:[],
activeLocation:''
};

function $(id){
return document.getElementById(id);
}

(function(){

const sel = $('loc-select');

RAH_LOCATIONS.forEach(loc => {

const opt = document.createElement('option');

opt.value = loc;
opt.textContent = loc;

sel.appendChild(opt);

});

})();

function addLocation(){

const val = $('loc-select').value;

if(!val) return;

if(state.locations.includes(val)) return;

state.locations.push(val);

renderLocationChips();

}

function removeLocation(loc){

state.locations =
state.locations.filter(x => x !== loc);

renderLocationChips();

}

function renderLocationChips(){

$('loc-chips').innerHTML =
state.locations.map(loc => `
<div class="loc-chip">
${loc}
<button onclick="removeLocation('${loc}')">
×
</button>
</div>
`).join('');

}

function renderLocationTabs(){

$('loc-tabs').innerHTML =
state.locations.map(loc => `
<button class="loc-tab ${loc===state.activeLocation?'active':''}"
onclick="switchLocation('${loc}')">
${loc}
</button>
`).join('');

}

function initTool(){

const email =
$('setup-email').value.trim();

if(!email.includes('@')){

alert('Enter a valid email');

return;

}

if(!state.locations.length){

alert('Add at least one location');

return;

}

state.email = email;

state.activeLocation =
state.locations[0];

$('setup-screen').style.display='none';

$('main-tool').style.display='block';

$('user-email-display').textContent =
email;

renderLocationTabs();

loadIntelligence(state.activeLocation);

loadEvents(state.activeLocation);

}

function switchLocation(loc){

state.activeLocation = loc;

renderLocationTabs();

loadIntelligence(loc);

loadEvents(loc);

}

function switchView(view){

['intel','events'].forEach(v => {

$('view-'+v).classList.toggle(
'active',
v===view
);

$('nav-'+v).classList.toggle(
'active',
v===view
);

});

}

function buildGoogleLink(query){

return 'https://www.google.com/search?q=' +
encodeURIComponent(query);

}

function renderCategory(title,items){

return `
<div class="org-card">

<h3 style="margin-bottom:14px">
${title}
</h3>

${items.map(item => `

<div style="margin-bottom:18px">

<div class="badge">
Referral opportunity
</div>

<div class="org-name">
${item.name}
</div>

<div class="org-meta">
${item.type}
</div>

<div class="approach-box">
${item.description}
</div>

<a href="${item.link}"
target="_blank"
style=")}

</div>
`;

}

async function loadIntelligence(loc){

$('intel-title').textContent =
'Your referral landscape — ' + loc;

$('intel-content').innerHTML = `
<div class="loading-card">
<span class="pulse"></span>
Building local intelligence for ${loc}...
</div>
`;

await new Promise(r=>setTimeout(r,600));

const categories = [

{
title:'NHS organisations',
items:[
{
name:'NHS discharge teams',
type:'Tier 1 — NHS',
description:'Hospital discharge teams are one of the highest-volume referral routes for funded care packages.',
link:buildGoogleLink(
`NHS discharge team ${loc}`
)
},
{
name:'Integrated Care Board',
type:'Tier 1 — Commissioning',
description:'ICBs manage commissioning and provider engagement opportunities.',
link:buildGoogleLink(
`ICB ${loc}`
)
}
]
},

{
title:'GP practices & PCNs',
items:[
{
name:'Primary Care Networks',
type:'Tier 1 — Primary care',
description:'PCNs and social prescribing teams regularly identify patients needing support at home.',
link:buildGoogleLink(
`Primary Care Network ${loc}`
)
},
{
name:'GP practices',
type:'Tier 1 — Community referrals',
description:'Practice managers and link workers can become valuable local referral partners.',
link:buildGoogleLink(
`GP practice ${loc}`
)
}
]
},

{
title:'Private hospitals & clinics',
items:[
{
name:'Private hospitals',
type:'Tier 2 — Self-funding',
description:'Post-surgical patients often require short-term or ongoing support at home.',
link:buildGoogleLink(
`private hospital ${loc}`
)
},
{
name:'Physiotherapy clinics',
type:'Tier 2 — Recovery pathways',
description:'Physiotherapists regularly identify patients struggling at home.',
link:buildGoogleLink(
`physiotherapy clinic ${loc}`
)
}
]
},

{
title:'Solicitors',
items:[
{
name:'Probate solicitors',
type:'Tier 2 — Elderly clients',
description:'Private client and probate teams frequently support families needing care guidance.',
link:buildGoogleLink(
`probate solicitor ${loc}`
)
}
]
},

{
title:'Dementia & carers groups',
items:[
{
name:'Dementia cafés',
type:'Tier 1 — Community engagement',
description:'Families attending dementia groups are often close to requiring paid care support.',
link:buildGoogleLink(
`dementia cafe ${loc}`
)
},
{
name:'Age UK branches',
type:'Tier 1 — Older adult support',
description:'Local support organisations can become trusted referral relationships.',
link:buildGoogleLink(
`Age UK ${loc}`
)
}
]
}

];

$('intel-content').innerHTML =
categories.map(cat =>
renderCategory(cat.title,cat.items)
).join('');

}

async function loadEvents(loc){

$('events-content').innerHTML = `
<div class="loading-card">
<span class="pulse"></span>
Searching local networking opportunities...
</div>
`;

await new Promise(r=>setTimeout(r,600));

const events = [

{
title:'ICB provider forums',
description:'Commissioning and provider engagement sessions.',
link:buildGoogleLink(
`ICB provider forum ${loc}`
)
},

{
title:'Health & social care networking',
description:'Local healthcare collaboration events.',
link:buildGoogleLink(
`health social care networking ${loc}`
)
},

{
title:'Dementia alliance meetings',
description:'Community dementia engagement opportunities.',
link:buildGoogleLink(
`Dementia Action Alliance ${loc}`
)
}

];

$('events-content').innerHTML =
events.map(e => `
<div class="event-card">

<div class="org-name">
${e.title}
</div>

<div class="approach-box">
${e.description}
</div>

<a href="${e.link}"
target="_blank"
style="font-size:12px;color:#>

</div>
`).join('');

}

</script>

</body>
</html>
