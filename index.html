<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHS & Private Referral Engagement Tool — Right at Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a18;min-height:100vh}
.shell{max-width:880px;margin:0 auto;padding:28px 20px 80px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.logo-badge{background:#1D9E75;color:white;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;letter-spacing:0.04em;white-space:nowrap}
.top-title{font-size:17px;font-weight:500}
.btn{font-family:inherit;font-size:13px;padding:8px 14px;border:0.5px solid #d4d2ca;border-radius:8px;background:transparent;color:#1a1a18;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background 0.12s;white-space:nowrap}
.btn:hover{background:#f0ede6}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn.primary:hover{background:#0F6E56}
.btn.sm{font-size:12px;padding:5px 10px}
.btn.danger{color:#A32D2D;border-color:#F09595}

/* SETUP SCREEN */
.setup-card{background:#fff;border:0.5px solid #d4d2ca;border-radius:14px;padding:32px 28px;max-width:560px;margin:40px auto 0}
.setup-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.setup-field{margin-bottom:14px}
.setup-field label{display:block;font-size:12px;font-weight:500;color:#888780;margin-bottom:5px;letter-spacing:0.04em;text-transform:uppercase}
.setup-field input,.setup-field select{font-family:inherit;font-size:14px;padding:10px 12px;border:0.5px solid #d4d2ca;border-radius:8px;background:#f8f7f4;color:#1a1a18;width:100%}

/* WORKSPACE LAYOUT */
.workspace{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}
@media(max-width:768px){.workspace{grid-template-columns:1fr}}
.pane{background:#fff;border:0.5px solid #d4d2ca;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:16px}
.pane-title{font-size:14px;font-weight:600;color:#888780;display:flex;align-items:center;gap:6px}
textarea{font-family:inherit;font-size:14px;line-height:1.5;padding:12px;border:0.5px solid #d4d2ca;border-radius:8px;resize:vertical;min-height:200px;width:100%;background:#fafafa}
textarea:focus{outline:none;border-color:#1D9E75}
.output-box{border:0.5px solid #d4d2ca;border-radius:8px;padding:12px;background:#fcfcfc;min-height:200px;white-space:pre-wrap;font-size:14px;line-height:1.5;overflow-y:auto}
.hidden{display:none}
</style>
</head>
<body>

<div class="shell">
    <!-- Top Navigation -->
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:12px">
            <span class="logo-badge">RIGHT AT HOME</span>
            <span class="top-title">Referral Engagement Tool</span>
        </div>
        <div id="nav-actions" class="hidden">
            <button class="btn btn.sm" onclick="showSetup()"><i class="ti ti-settings"></i> Settings</button>
        </div>
    </div>

    <!-- Setup / Configuration View -->
    <div id="setup-view" class="setup-card">
        <div class="setup-logo">
            <i class="ti ti-brain" style="font-size:28px;color:#1D9E75"></i>
            <h2 style="font-size:20px">Gemini Integration Setup</h2>
        </div>
        <div class="setup-field">
            <label for="api-key">Google Gemini API Key</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
        </div>
        <div class="setup-field">
            <label for="referral-type">Default Target Audience</label>
            <select id="referral-type">
                <option value="NHS GP / Hospital Discharge">NHS GP / Hospital Discharge</option>
                <option value="Private Pay / Self-Funding Families">Private Pay / Self-Funding Families</option>
                <option value="Social Services / Local Authority">Social Services / Local Authority</option>
            </select>
        </div>
        <button class="btn primary" style="width:100%;margin-top:10px" onclick="saveSetup()">Launch Workspace</button>
    </div>

    <!-- Active Workspace View -->
    <div id="workspace-view" class="hidden">
        <div class="workspace">
            <!-- Left Pane: Input -->
            <div class="pane">
                <div class="pane-title"><i class="ti ti-notes"></i> Case Details / Prompt</div>
                <textarea id="prompt-input" placeholder="Enter patient notes, hospital discharge scenarios, or primary objectives here..."></textarea>
                <button id="submit-btn" class="btn primary" onclick="generateEngagementText()">
                    <i class="ti ti-sparkles"></i> Generate Communication
                </button>
            </div>

            <!-- Right Pane: Live Streaming Output -->
            <div class="pane">
                <div class="pane-title"><i class="ti ti-message-share"></i> Tailored Outreach Copy</div>
                <div id="output-response" class="output-box">Your generated engagement response will appear here in real-time...</div>
                <div style="display:flex;gap:10px;justify-content:flex-end">
                    <button class="btn sm" onclick="copyToClipboard()"><i class="ti ti-copy"></i> Copy</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// State Management
let geminiApiKey = '';
let selectedAudience = '';

function saveSetup() {
    const keyInput = document.getElementById('api-key').value.trim();
    if (!keyInput) {
        alert('Please provide a valid Google Gemini API Key.');
        return;
    }
    geminiApiKey = keyInput;
    selectedAudience = document.getElementById('referral-type').value;

    document.getElementById('setup-view').classList.add('hidden');
    document.getElementById('workspace-view').classList.remove('hidden');
    document.getElementById('nav-actions').classList.remove('hidden');
}

function showSetup() {
    document.getElementById('setup-view').classList.remove('hidden');
    document.getElementById('workspace-view').classList.add('hidden');
    document.getElementById('nav-actions').classList.add('hidden');
}

async function generateEngagementText() {
    const inputPrompt = document.getElementById('prompt-input').value.trim();
    const outputDiv = document.getElementById('output-response');
    const submitBtn = document.getElementById('submit-btn');

    if (!inputPrompt) {
        alert('Please provide case details or notes to process.');
        return;
    }

    // Reset layout UI elements
    outputDiv.innerText = '';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="ti ti-loader animate-spin"></i> Processing...';

    // Constructing the engineered system instructions context based on setup preference
    const completePrompt = `You are a helpful communications specialist for "Right at Home" home care services. 
Target Audience: ${selectedAudience}
Context notes to draft from: ${inputPrompt}

Provide a professional, tailored response aligning with UK compliance guidelines and appropriate tone.`;

    // Gemini 2.5 Flash Server-Sent-Events Endpoint
    const endpoint = `https://googleapis.com{geminiApiKey}`;

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: completePrompt }]
                }]
            })
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || 'API Communication Error.');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            
            // Gemini streams return text segments wrapped inside chunks of JSON arrays
            // Cleaning up the format anomalies to target text object structures
            try {
                let cleanBuffer = buffer.trim();
                if (cleanBuffer.startsWith('[')) cleanBuffer = cleanBuffer.slice(1);
                if (cleanBuffer.endsWith(']')) cleanBuffer = cleanBuffer.slice(0, -1);
                
                // Splits stream chunks cleanly
                const chunks = cleanBuffer.split(',\n');
                let liveOutputText = '';

                for (let chunk of chunks) {
                    try {
                        const parsed = JSON.parse(chunk.trim());
                        if (parsed.candidates?.[0]?.content?.parts?.[0]?.text) {
                            liveOutputText += parsed.candidates[0].content.parts[0].text;
                        }
                    } catch (e) {
                        // Keep parsing remaining whole blocks if a fragment fails
                    }
                }
                
                if (liveOutputText) {
                    outputDiv.innerText = liveOutputText;
                }
            } catch (err) {
                // Buffer catching processing cycle anomalies safely
            }
        }

    } catch (error) {
        outputDiv.innerText = `An Error Occurred: ${error.message}\nEnsure your API key is correct and valid.`;
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="ti ti-sparkles"></i> Generate Communication';
    }
